version: '3.9'

# Local-dev mirror of the production services. Dokploy provisions Postgres and
# RustFS as independent managed resources in production (see
# docs/adr/0001-self-hosted-postgres-and-blob-storage.md) — this file is NOT what
# gets deployed, it just lets you develop against the real thing locally instead
# of pointing at Neon/production storage.
#
# Usage:
#   docker-compose up -d
#   Then open http://localhost:9001 (RustFS console) and create a "media" bucket
#   with public read access, matching what you'd set up in Dokploy.
#   Point your .env at the values below (see .env.example).

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload
      POSTGRES_DB: payload
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U payload']
      interval: 5s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: 'true'
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web console
    volumes:
      - rustfsdata:/data

volumes:
  pgdata:
  rustfsdata:
