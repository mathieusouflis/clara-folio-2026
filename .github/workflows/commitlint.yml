name: Commitlint

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  commitlint:
    name: Validate commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Conventional Commits, checked without installing commitlint. Merge
      # commits are skipped: their subject is generated by git, not the author.
      - name: Check commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          PATTERN='^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([^)]+\))?!?: .+'
          FAILED=0

          for sha in $(git rev-list --no-merges "$BASE_SHA".."$HEAD_SHA"); do
            subject=$(git log -1 --format=%s "$sha")
            if ! printf '%s' "$subject" | grep -Eq "$PATTERN"; then
              echo "::error::Not a Conventional Commit: ${sha:0:8} \"$subject\""
              FAILED=1
            fi
          done

          if [ "$FAILED" -ne 0 ]; then
            echo "Expected: <type>(<optional scope>): <description>  — e.g. feat(admin): add slug field"
            exit 1
          fi

          echo "All commit messages follow Conventional Commits."
