name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Payload boots its config (and therefore the DB adapter) in almost every
  # command, so even lint/build need these to be set to something.
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clara_folio_test
  PAYLOAD_SECRET: ci-secret-not-used-outside-ci
  NEXT_PUBLIC_SERVER_URL: http://localhost:3000

jobs:
  quality:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

  test:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: clara_folio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # No migrate step: the migration baseline is a no-op and cannot build a
      # DB from scratch. Payload pushes the schema on init outside production,
      # which is what getPayload() in the tests does.
      - name: Integration tests
        run: pnpm test:int

  # e2e:
  #   name: E2E tests
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 20
  #   services:
  #     postgres:
  #       image: postgres:17-alpine
  #       env:
  #         POSTGRES_USER: postgres
  #         POSTGRES_PASSWORD: postgres
  #         POSTGRES_DB: clara_folio_test
  #       ports:
