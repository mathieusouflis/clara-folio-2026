  #     - uses: actions/checkout@v7

  #     - uses: pnpm/action-setup@v6

  #     - uses: actions/setup-node@v6
  #       with:
  #         node-version: 22
  #         cache: pnpm

  #     - name: Install dependencies
  #       run: pnpm install --frozen-lockfile

  #     - name: Install Playwright browsers
  #       run: pnpm exec playwright install --with-deps chromium

  #     # Playwright starts the app itself (see webServer in playwright.config.ts)
  #     # and waits for it to serve, so the dev server has pushed the schema
  #     # before the first test seeds a user.
  #     - name: E2E tests
  #       run: pnpm test:e2e

  #     - if: ${{ !cancelled() }}
  #       uses: actions/upload-artifact@v7
  #       with:
  #         name: playwright-report
  #         path: playwright-report/
  #         retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: clara_folio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # src/app/sitemap.ts queries Payload, so `next build` needs real tables.
      # The build runs in production mode (no schema push), so create the
      # schema first — see the script for why `payload migrate` can't do this.
      - name: Push database schema
        run: pnpm payload run src/scripts/push-schema.ts

      # No SENTRY_AUTH_TOKEN in forks/PRs — the Sentry plugin skips the
      # source-map upload and the build still succeeds.
      - name: Build
        run: pnpm build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
